<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Agency Client Intake</title>
  <style>
    :root { --bg:#0b1220; --card:#111a2e; --muted:#aab4c5; --txt:#eef2ff; --acc:#4f7cff; --bad:#ff5a6a; --ok:#22c55e; }
    *{box-sizing:border-box;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial}
    body{margin:0;background:linear-gradient(180deg,var(--bg),#070b14);color:var(--txt);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
    .wrap{width:100%;max-width:920px}
    .card{background:rgba(17,26,46,.9);border:1px solid rgba(255,255,255,.08);border-radius:18px;padding:22px 22px 16px;box-shadow:0 12px 32px rgba(0,0,0,.35)}
    h1{margin:0 0 8px;font-size:22px}
    p{margin:0 0 18px;color:var(--muted);line-height:1.6}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    @media (max-width:820px){.grid{grid-template-columns:1fr}}
    label{display:block;font-size:13px;color:#cfd6e6;margin:0 0 6px}
    input,select,textarea{width:100%;background:#0c1326;color:var(--txt);border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:10px 12px;outline:none}
    textarea{min-height:92px;resize:vertical}
    input:focus,select:focus,textarea:focus{border-color:rgba(79,124,255,.65);box-shadow:0 0 0 3px rgba(79,124,255,.15)}
    .row{margin-bottom:12px}
    .actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-top:10px}
    button{background:var(--acc);border:none;color:white;border-radius:12px;padding:10px 14px;font-weight:600;cursor:pointer}
    button:disabled{opacity:.6;cursor:not-allowed}
    .ghost{background:transparent;border:1px solid rgba(255,255,255,.18)}
    .status{margin-top:12px;padding:10px 12px;border-radius:12px;border:1px solid rgba(255,255,255,.12);background:#0c1326;color:var(--muted);line-height:1.55;display:none;white-space:pre-wrap}
    .status.ok{border-color:rgba(34,197,94,.35);color:#c9f7d7}
    .status.bad{border-color:rgba(255,90,106,.35);color:#ffd2d6}
    .tiny{font-size:12px;color:var(--muted);margin-top:8px}
    code{background:rgba(255,255,255,.08);padding:2px 6px;border-radius:8px}
    .req{color:#ffb4bd;margin-right:6px}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>نموذج إدخال عميل جديد (Client Intake)</h1>
      <p>املأ البيانات التالية. عند الضغط على <b>إرسال</b> سيتم إرسال البيانات إلى <b>n8n Webhook</b> ليكمل التصنيف والتجهيز تلقائيًا.</p>

      <form id="intakeForm">
        <div class="grid">
          <div class="row">
            <label>اسم العميل / النشاط <span class="req">*</span></label>
            <input name="client_name" required placeholder="مثال: Core Clinic Riyadh" />
          </div>
          <div class="row">
            <label>المدينة <span class="req">*</span></label>
            <input name="city" required placeholder="مثال: الرياض" />
          </div>

          <div class="row">
            <label>الدولة</label>
            <input name="country" placeholder="مثال: السعودية" value="السعودية" />
          </div>

          <div class="row">
            <label>اللغة المفضلة</label>
            <select name="brand_language">
              <option value="ar" selected>عربي</option>
              <option value="en">English</option>
              <option value="both">Arabic + English</option>
            </select>
          </div>

          <!-- ✅ NEW: Industry -->
          <div class="row">
            <label>نشاط العميل (Industry) <span class="req">*</span></label>
            <select name="industry" id="industry" required>
              <option value="" selected>اختر النشاط</option>
              <option value="clinics">عيادات / طبي / تجميل</option>
              <option value="restaurants">مطاعم / كافيهات</option>
              <option value="real_estate">عقار</option>
              <option value="ecommerce">تجارة إلكترونية</option>
              <option value="education">تعليم / تدريب</option>
              <option value="home_services">خدمات منزلية</option>
              <option value="salon_spa">صالون / سبا</option>
              <option value="automotive">سيارات</option>
              <option value="travel_hospitality">سياحة / فنادق</option>
              <option value="b2b_services">خدمات للشركات (B2B)</option>
              <option value="other">أخرى</option>
            </select>
          </div>

          <!-- ✅ NEW: Industry other (only if other) -->
          <div class="row" id="industryOtherWrap" style="display:none;">
            <label>اكتب نشاط العميل</label>
            <input name="industry_other" id="industry_other" placeholder="مثال: متجر عطور" />
          </div>

          <div class="row">
            <label>رابط الموقع (اختياري)</label>
            <input name="website_url" placeholder="https://example.com" />
          </div>
          <div class="row">
            <label>رابط إنستقرام (اختياري)</label>
            <input name="instagram_url" placeholder="https://instagram.com/..." />
          </div>

          <div class="row">
            <label>رابط تيك توك (اختياري)</label>
            <input name="tiktok_url" placeholder="https://tiktok.com/@..." />
          </div>
          <div class="row">
            <label>رابط تويتر / X (اختياري)</label>
            <input name="twitter_url" placeholder="https://x.com/..." />
          </div>
        </div>

        <div class="row">
          <label>وصف النشاط (سطرين–5 سطور) <span class="req">*</span></label>
          <textarea name="business_description" required placeholder="اكتب وصف واضح عن نشاط العميل، الخدمات الأساسية، ومن يستهدف..."></textarea>
        </div>

        <div class="grid">
          <div class="row">
            <label>الهدف الأساسي <span class="req">*</span></label>
            <select name="primary_goal" required>
              <option value="leads" selected>زيادة طلبات/حجوزات (Leads)</option>
              <option value="sales">مبيعات مباشرة (Sales)</option>
              <option value="awareness">وعي بالعلامة (Awareness)</option>
              <option value="retention">إعادة استهداف/عودة العملاء (Retention)</option>
            </select>
          </div>

          <div class="row">
            <label>قناة التواصل الأساسية <span class="req">*</span></label>
            <select name="primary_channel" required>
              <option value="whatsapp" selected>WhatsApp</option>
              <option value="phone">اتصال</option>
              <option value="instagram_dm">Instagram DM</option>
              <option value="website_form">Website Form</option>
              <option value="email">Email</option>
            </select>
          </div>
        </div>

        <div class="row">
          <label>منافسين (اختياري) — اكتب حسابات/روابط مفصولة بفواصل</label>
          <input name="competitors" placeholder="@comp1,@comp2 أو https://instagram.com/..." />
        </div>

        <div class="actions">
          <button id="submitBtn" type="submit">إرسال</button>
          <button class="ghost" type="reset">مسح</button>
        </div>

        <div class="status" id="statusBox"></div>
        <div class="tiny">
          ملاحظة: تحتاج ضبط رابط الـ Webhook في الملف <code>config.js</code>.
        </div>
      </form>
    </div>
  </div>

  <script src="./config.js"></script>
  <script>
    const form = document.getElementById('intakeForm');
    const btn = document.getElementById('submitBtn');
    const statusBox = document.getElementById('statusBox');

    // ✅ NEW: toggle industry_other
    const industryEl = document.getElementById('industry');
    const industryOtherWrap = document.getElementById('industryOtherWrap');
    const industryOtherEl = document.getElementById('industry_other');

    function toggleIndustryOther(){
      const isOther = industryEl.value === 'other';
      industryOtherWrap.style.display = isOther ? 'block' : 'none';
      if (!isOther) industryOtherEl.value = '';
    }
    industryEl.addEventListener('change', toggleIndustryOther);
    toggleIndustryOther();

    function showStatus(msg, kind){
      statusBox.style.display = 'block';
      statusBox.className = 'status ' + (kind || '');
      statusBox.textContent = msg;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      if (!window.INTAKE_WEBHOOK_URL || window.INTAKE_WEBHOOK_URL.includes('CHANGE_ME')) {
        showStatus('⚠️ لازم تعدّل رابط الـ Webhook أولاً في config.js ثم أعد النشر على Cloudflare Pages.', 'bad');
        return;
      }

      // Convert form data to JSON object
      const data = Object.fromEntries(new FormData(form).entries());

      // ✅ Normalize industry value when "other" is selected
      // (هذا يساعدك في التحليل ويدخل قيمة واضحة في قاعدة البيانات)
      const normalizedIndustry =
        data.industry === 'other' && data.industry_other
          ? data.industry_other.trim()
          : data.industry;

      const payload = {
        ...data,
        industry: normalizedIndustry,
        submitted_at: new Date().toISOString(),
        source: 'cloudflare_pages_intake'
      };

      btn.disabled = true;
      showStatus('جاري الإرسال...', '');

      try {
        const res = await fetch(window.INTAKE_WEBHOOK_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        const text = await res.text();

        if (!res.ok) {
          showStatus('❌ فشل الإرسال. تحقق من Webhook في n8n.\n\n' + text, 'bad');
          btn.disabled = false;
          return;
        }

        showStatus('✅ تم إرسال بيانات العميل بنجاح.\n\n' + text, 'ok');
        form.reset();
        toggleIndustryOther();
      } catch (err) {
        showStatus('❌ فشل الاتصال: ' + (err?.message || err), 'bad');
      } finally {
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
